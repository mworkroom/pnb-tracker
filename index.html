<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f5f5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="PayNowBiz" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>PayNowBiz 선불 잔액</title>
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div>
          <h1>페이나우비즈 사용내역</h1>
        </div>
        <span id="saveStatus" class="save-status" aria-live="polite"></span>
      </header>

      <main>
        <section class="balance-section" aria-labelledby="activeTitle">
          <div class="section-heading">

          </div>
          <div id="activeList" class="balance-list"></div>
        </section>

        <section class="new-panel" aria-labelledby="newTitle">
          <div class="section-heading">
            <div>
              <h2 id="newTitle">선결제 내역 입력</h2>
              <p>카드 정보는 승인번호 기록에 함께 저장됩니다.</p>
            </div>
          </div>

          <form id="prepaymentForm" autocomplete="off" novalidate>
            <label>
              <span>1. 카드</span>
              <select id="cardSelect" required></select>
            </label>

            <div id="registeredCardPreview" class="card-preview" aria-live="polite"></div>

            <div id="unregisteredFields" class="unregistered-fields" hidden>
              <div class="field-grid">
                <label>
                  <span>앞 4자리</span>
                  <input
                    id="unregisteredFirst4"
                    class="digit-input"
                    type="text"
                    inputmode="numeric"
                    pattern="[0-9]*"
                    maxlength="4"
                    placeholder="1234"
                  />
                </label>
                <label>
                  <span>뒤 4자리</span>
                  <input
                    id="unregisteredLast4"
                    class="digit-input"
                    type="text"
                    inputmode="numeric"
                    pattern="[0-9]*"
                    maxlength="4"
                    placeholder="5678"
                  />
                </label>
              </div>
              <label>
                <span>카드 메모 선택</span>
                <input
                  id="unregisteredMemo"
                  type="text"
                  maxlength="24"
                  placeholder="예: 이모 카드"
                />
              </label>
            </div>

            <label>
              <span>2. 카드 번호</span>
              <input id="cardNumberView" type="text" readonly aria-readonly="true" />
            </label>

            <label>
              <span>3. 승인번호</span>
              <input
                id="approvalNumber"
                type="text"
                inputmode="numeric"
                placeholder="앞자리 0도 그대로 입력"
                required
              />
            </label>

            <label>
              <span>4. 승인일</span>
              <input id="approvalDate" type="date" required />
            </label>

            <label>
              <span>5. 승인금액</span>
              <input
                id="approvalAmount"
                class="amount-input"
                type="text"
                inputmode="numeric"
                pattern="[0-9]*"
                placeholder="0"
                required
              />
            </label>

            <label>
              <span>6. 메모</span>
              <textarea
                id="prepaymentMemo"
                maxlength="80"
                rows="3"
                placeholder="예: 병원 결제용, 6월 선결제"
              ></textarea>
            </label>

            <button class="primary-button" type="submit">새 잔액 저장</button>
          </form>
        </section>
		
        <section class="completed-section" aria-labelledby="completedTitle">
          <button
            id="completedToggle"
            class="completed-toggle"
            type="button"
            aria-expanded="false"
          >
            <span>
              <strong id="completedTitle">사용 완료 내역</strong>
              <small id="completedSummary">0건</small>
            </span>
            <span class="toggle-mark" aria-hidden="true">열기</span>
          </button>
          <div id="completedList" class="balance-list completed-list" hidden></div>
        </section>

        <section class="completed-section cancelled-section" aria-labelledby="cancelledTitle">
          <button
            id="cancelledToggle"
            class="completed-toggle"
            type="button"
            aria-expanded="false"
          >
            <span>
              <strong id="cancelledTitle">등록 취소 내역</strong>
              <small id="cancelledSummary">0건</small>
            </span>
            <span class="toggle-mark" aria-hidden="true">열기</span>
          </button>
          <div id="cancelledList" class="balance-list completed-list" hidden></div>
        </section>
		
		
		
      </main>
    </div>

    <template id="balanceTemplate">
      <article class="balance-card">
        <button class="balance-toggle" type="button">
          <span class="accent" aria-hidden="true"></span>
          <span class="card-summary">
            <span class="remaining-line">
              <span class="top-card-name"></span>
              <strong class="remaining-text"></strong>
              <span class="status-badge"></span>
            </span>
            <span class="summary-grid">
              <span>
                <small>카드번호</small>
                <b class="card-label"></b>
              </span>
			  <span>
                <small>승인번호</small>
                <b class="approval-number"></b>
              </span>
              <span>
                <small>승인일</small>
                <b class="approval-date"></b>
              </span>
              <span>
                <small>승인금액</small>
                <b class="approval-amount"></b>
              </span>

            </span>
          </span>
        </button>
        <div class="balance-detail"></div>
      </article>
    </template>

    <div id="cancelDialog" class="dialog-backdrop" hidden>
      <section class="dialog-panel" role="dialog" aria-modal="true" aria-labelledby="cancelDialogTitle">
        <h2 id="cancelDialogTitle">등록 취소</h2>
        <p>이 선결제와 연결된 사용 내역이 모두 취소 처리됩니다.</p>
        <p>정말 등록을 취소할까요?</p>
        <div class="dialog-actions">
          <button id="cancelDialogBack" class="secondary-button" type="button">돌아가기</button>
          <button id="cancelDialogConfirm" class="danger-small-button" type="button">등록 취소</button>
        </div>
      </section>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
