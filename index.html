<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f5f5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="PayNowBiz" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>페이나우비즈 사용내역</title>
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section id="authScreen" class="auth-screen">
      <div class="auth-panel">
        <h1>PayNowBiz Tracker</h1>
        <p id="authMessage">선결제 사용내역을 불러오려면 Google 계정으로 로그인하세요.</p>
        <button id="googleLoginButton" class="primary-button" type="button">Google로 로그인</button>
        <button id="authLogoutButton" class="secondary-button" type="button" hidden>로그아웃 후 다시 로그인</button>
      </div>
    </section>

    <section id="setupScreen" class="auth-screen" hidden>
      <div class="auth-panel">
        <h1>PayNowBiz Tracker</h1>
        <p id="setupMessage">이 계정은 아직 PayNowBiz Tracker에 등록되지 않았습니다.</p>
        <button id="setupLogoutButton" class="secondary-button" type="button">로그아웃</button>
      </div>
    </section>

    <div id="appShell" class="app-shell" hidden>
      <header class="app-header">
        <div>
          <h1>페이나우비즈 사용내역</h1>
        </div>
        <div class="header-actions">
          <span id="saveStatus" class="save-status" aria-live="polite"></span>
        </div>
      </header>

      <div id="mainView" class="main-view">
        <main>
        <section class="balance-section" aria-labelledby="activeTitle">
          <div class="section-heading">
            <h2 id="activeTitle" class="sr-only">사용 중인 잔액</h2>
          </div>
          <div id="activeList" class="balance-list"></div>
        </section>

        <section class="new-panel" aria-labelledby="newTitle">
          <div class="section-heading">
            <div>
              <h2 id="newTitle">선결제 내역 신규 등록</h2>
              <p></p>
            </div>
          </div>

          <form id="prepaymentForm" autocomplete="off" novalidate>
            <label>
              <span>1. 카드</span>
              <select id="cardSelect" required></select>
            </label>

            <div id="registeredCardPreview" class="card-preview" aria-live="polite"></div>

            <div id="unregisteredFields" class="unregistered-fields" hidden>
              <div class="field-grid">
                <label>
                  <span>앞 4자리</span>
                  <input
                    id="unregisteredFirst4"
                    class="digit-input"
                    type="text"
                    inputmode="numeric"
                    pattern="[0-9]*"
                    maxlength="4"
                    placeholder="1234"
                  />
                </label>
                <label>
                  <span>뒤 4자리</span>
                  <input
                    id="unregisteredLast4"
                    class="digit-input"
                    type="text"
                    inputmode="numeric"
                    pattern="[0-9]*"
                    maxlength="4"
                    placeholder="5678"
                  />
                </label>
              </div>
              <label>
                <span>카드 별명 입력</span>
                <input
                  id="unregisteredMemo"
                  type="text"
                  maxlength="24"
                  placeholder="예: 복태 카드"
                />
              </label>
            </div>

            <label>
              <span>2. 승인번호</span>
              <input
                id="approvalNumber"
                type="text"
                inputmode="numeric"
                required
              />
            </label>

            <label>
              <span>3. 승인일</span>
              <span class="date-field">
                <input id="approvalDate" type="date" required />
                <span id="approvalDateDisplay" class="date-display" aria-hidden="true"></span>
              </span>
            </label>

            <label>
              <span>4. 승인금액</span>
              <input
                id="approvalAmount"
                class="amount-input"
                type="text"
                inputmode="numeric"
                pattern="[0-9]*"
                placeholder="0"
                required
              />
            </label>

            <label>
              <span>5. 메모</span>
              <textarea
                id="prepaymentMemo"
                maxlength="80"
                rows="3"
              ></textarea>
            </label>
            <button id="prepaymentSubmit" class="primary-button" type="submit">저장</button>
          </form>
        </section>


        <div class="secondary-tools" aria-label="보조 기능">
          <section class="search-panel" aria-labelledby="searchTitle">
            <div class="section-heading">
              <div>
                <h2 id="searchTitle">승인번호로 검색</h2>
              </div>
            </div>
            <label class="search-label">
              <div class="search-row">
                <input
                  id="approvalSearchInput"
                  type="search"
                  inputmode="numeric"
                  placeholder="번호를 입력해주세요"
                  autocomplete="off"
                />
                <button id="approvalSearchClear" class="secondary-button clear-search-button" type="button" hidden>지우기</button>
              </div>
            </label>
            <div id="searchSection" class="search-results" hidden>
              <div class="section-subheading">
                <strong>검색 결과</strong>
                <small id="searchSummary"></small>
              </div>
              <div id="searchList" class="balance-list"></div>
            </div>
          </section>

          <section class="completed-section" aria-labelledby="completedTitle">
            <button
              id="completedToggle"
              class="completed-toggle"
              type="button"
              aria-expanded="false"
            >
              <span>
                <strong id="completedTitle">최근 완료 내역</strong>
                <small id="completedSummary">0건</small>
              </span>
              <span class="toggle-mark" aria-hidden="true">열기</span>
            </button>
            <div id="completedList" class="balance-list completed-list" hidden></div>
          </section>

          <section class="completed-section archive-section" aria-labelledby="archiveTitle">
            <button
              id="archiveToggle"
              class="completed-toggle"
              type="button"
              aria-expanded="false"
            >
              <span>
                <strong id="archiveTitle">이전 기록</strong>
                <small id="archiveSummary"></small>
              </span>
              <span class="toggle-mark" aria-hidden="true">열기</span>
            </button>
            <div id="archiveYearList" class="archive-year-list-wrap" hidden></div>
          </section>
        </div>
        </main>

      <footer class="account-footer" aria-label="계정 및 관리">
        <p id="userInfo" class="account-info"></p>
        <div class="account-actions">
          <button id="adminButton" class="small-icon-button" type="button" hidden>관리</button>
          <button id="logoutButton" class="small-icon-button" type="button">로그아웃</button>
        </div>
      </footer>
      </div>

      <section id="adminDialog" class="admin-screen" aria-labelledby="adminDialogTitle" hidden>
        <header class="admin-screen-header">
          <button id="adminCloseButton" class="small-icon-button admin-back-button" type="button">돌아가기</button>
          <div>
            <h2 id="adminDialogTitle">관리</h2>
            <p>카드와 취소 내역을 필요한 만큼만 펼쳐서 봅니다.</p>
          </div>
        </header>
        <nav class="admin-tabs" aria-label="관리 메뉴">
          <button class="admin-tab" type="button" data-admin-tab="cards">카드</button>
          <button class="admin-tab" type="button" data-admin-tab="cancelled">취소 내역</button>
          <button class="admin-tab" type="button" data-admin-tab="backup">백업</button>
        </nav>
        <div id="adminContent" class="admin-content"></div>
      </section>
    </div>

    <template id="balanceTemplate">
      <article class="balance-card">
        <button class="balance-toggle" type="button">
          <span class="accent" aria-hidden="true"></span>
          <span class="card-summary">
            <span class="card-title-line">
              <span class="top-card-name"></span>
              <span class="top-card-memo"></span>
            </span>
            <span class="remaining-line">
              <strong class="remaining-text"></strong>
              <span class="status-badge"></span>
            </span>
            <span class="summary-grid">
              <span>
                <small>카드번호</small>
                <b class="card-label"></b>
              </span>
              <span>
                <small>승인번호</small>
                <b class="approval-number"></b>
              </span>
              <span>
                <small>승인일</small>
                <b class="approval-date"></b>
              </span>
              <span>
                <small>승인금액</small>
                <b class="approval-amount"></b>
              </span>
            </span>
          </span>
        </button>
        <div class="balance-detail"></div>
      </article>
    </template>

    <div id="cancelDialog" class="dialog-backdrop" hidden>
      <section class="dialog-panel" role="dialog" aria-modal="true" aria-labelledby="cancelDialogTitle">
        <h2 id="cancelDialogTitle">등록 취소</h2>
        <p>선결제 내역은 관리자 모드에서만 복구할 수 있습니다. 정말 취소할까요?</p>
        <div class="dialog-actions">
          <button id="cancelDialogBack" class="secondary-button" type="button">돌아가기</button>
          <button id="cancelDialogConfirm" class="danger-small-button" type="button">진짜 취소</button>
        </div>
      </section>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
